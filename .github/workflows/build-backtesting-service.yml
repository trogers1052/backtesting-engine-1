name: Build backtesting-service (Raspberry Pi)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backtesting-service
        uses: actions/checkout@v6

      - name: Checkout decision-engine
        uses: actions/checkout@v6
        with:
          repository: trogers1052/decision-engine
          path: decision_engine
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        env:
          DECISION_ENGINE_PATH: decision_engine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          MARKET_DATA_DB_PASSWORD: test
          DECISION_ENGINE_PATH: decision_engine
        run: pytest tests/ -v --tb=short

  build:
    name: Build ARM64 Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout backtesting-service
        uses: actions/checkout@v6

      - name: Checkout decision-engine
        uses: actions/checkout@v6
        with:
          repository: trogers1052/decision-engine
          path: decision_engine
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/trogers1052/backtesting-service:latest
            ghcr.io/trogers1052/backtesting-service:${{ github.sha }}
